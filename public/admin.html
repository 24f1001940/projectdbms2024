<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Dashboard | Jamia Canteen</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="mainpages.css">

    <style>
        .stats-card { background: var(--glass-bg); padding: 1.5rem; border-radius: 16px; text-align: center; border: 1px solid var(--glass-border); }
        .stats-card i { font-size: 2rem; margin-bottom: 1rem; color: var(--primary); }
        .stats-card h2 { font-weight: 700; margin-bottom: 0.2rem; }
        .stats-card p { font-size: 0.9rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .chart-container { height: 300px; margin-top: 2rem; }
    </style>
</head>

<body>

<div class="sidebar shadow-lg">
    <div class="text-center mb-5">
        <h4 class="font-weight-bold text-gradient">ADMIN PANEL</h4>
    </div>
    <ul class="list-group list-group-flush bg-transparent">
        <a href="#" class="list-group-item bg-transparent text-white border-0 active" onclick="showSection('overview')"><i class="fas fa-chart-line mr-3"></i>Overview</a>
        <a href="#" class="list-group-item bg-transparent text-white border-0" onclick="showSection('users')"><i class="fas fa-users mr-3"></i>Manage Users</a>
        <a href="#" class="list-group-item bg-transparent text-white border-0" onclick="showSection('canteens')"><i class="fas fa-store mr-3"></i>Canteens</a>
        <a href="#" class="list-group-item bg-transparent text-white border-0" onclick="showSection('orders')"><i class="fas fa-shopping-bag mr-3"></i>All Orders</a>
        <hr class="bg-secondary w-100">
        <a href="#" class="list-group-item bg-transparent text-warning border-0" onclick="App.logout()"><i class="fas fa-sign-out-alt mr-3"></i>Logout</a>
    </ul>
</div>

<div class="main-content">
    <nav class="navbar navbar-expand-lg mb-4 glass-card">
        <div class="container-fluid">
            <span class="navbar-text">Logged in as <strong id="adminName">Admin</strong></span>
            <div class="ml-auto">
                <button class="btn btn-sm btn-outline-light mr-2" onclick="App.toggleTheme()"><i class="fas fa-moon"></i></button>
                <button class="btn btn-sm btn-danger px-4" onclick="exportData('orders')"><i class="fas fa-file-export mr-2"></i>Export CSV</button>
            </div>
        </div>
    </nav>

    <!-- OVERVIEW SECTION -->
    <div id="section-overview" class="admin-section animate-fade-in">
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="stats-card glass-card">
                    <i class="fas fa-users"></i>
                    <h2 id="stat-users">0</h2>
                    <p>Total Users</p>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stats-card glass-card">
                    <i class="fas fa-hamburger"></i>
                    <h2 id="stat-orders">0</h2>
                    <p>Orders Today</p>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stats-card glass-card">
                    <i class="fas fa-rupee-sign"></i>
                    <h2 id="stat-revenue">0</h2>
                    <p>Total Revenue</p>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stats-card glass-card">
                    <i class="fas fa-store"></i>
                    <h2 id="stat-canteens">4</h2>
                    <p>Active Canteens</p>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-8">
                <div class="glass-card p-4 h-100">
                    <h5 class="font-weight-bold mb-4">Order Analytics</h5>
                    <canvas id="orderChart"></canvas>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="glass-card p-4 h-100">
                    <h5 class="font-weight-bold mb-4">Live Activity</h5>
                    <div id="liveActivity" class="small">
                        <p class="text-muted italic">Listening for updates...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- USERS SECTION -->
    <div id="section-users" class="admin-section animate-fade-in d-none">
        <div class="glass-card p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h5 class="font-weight-bold">Registered Users</h5>
                <input type="text" class="form-control w-25" placeholder="Search users..." onkeyup="filterUsers(this.value)">
            </div>
            <div class="table-responsive">
                <table class="table table-dark bg-transparent">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Joined</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- CANTEENS SECTION -->
    <div id="section-canteens" class="admin-section animate-fade-in d-none">
        <div class="row">
            <div class="col-md-4">
                <div class="glass-card p-4 mb-4">
                    <h5 class="font-weight-bold mb-4">Add Canteen</h5>
                    <div class="form-group">
                        <label class="small">Canteen Name</label>
                        <input id="canteenName" class="form-control">
                    </div>
                    <div class="form-group">
                        <label class="small">Location</label>
                        <input id="canteenLocation" class="form-control">
                    </div>
                    <button class="btn btn-danger btn-block" onclick="addCanteen()">CREATE</button>
                </div>
            </div>
            <div class="col-md-8">
                <div class="glass-card p-4">
                    <h5 class="font-weight-bold mb-4">Existing Canteens</h5>
                    <div id="canteenGrid" class="row"></div>
                </div>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script src="/app.js"></script>
<script>
    const socket = io();
    let orderChart;

    async function initDashboard() {
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user || user.role !== 'admin') window.location.href = '/loginpage.html';
        document.getElementById('adminName').innerText = user.name;

        loadStats();
        loadCharts();
        loadUsers();
        loadCanteens();
    }

    async function loadStats() {
        try {
            const [users, orders, ordersAll] = await Promise.all([
                App.fetchWithAuth('/api/admin/users').then(res => res.json()),
                App.fetchWithAuth('/api/admin/orders').then(res => res.json()),
                App.fetchWithAuth('/api/admin/orders').then(res => res.json())
            ]);

            document.getElementById('stat-users').innerText = users.length;
            document.getElementById('stat-orders').innerText = orders.length;
            const revenue = orders.reduce((acc, o) => acc + Number(o.total), 0);
            document.getElementById('stat-revenue').innerText = revenue.toFixed(0);
        } catch (e) { console.error(e); }
    }

    function loadCharts() {
        const ctx = document.getElementById('orderChart').getContext('2d');
        orderChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                datasets: [{
                    label: 'Orders',
                    data: [12, 19, 3, 5, 2, 3, 10],
                    borderColor: '#dc3545',
                    tension: 0.4,
                    fill: true,
                    backgroundColor: 'rgba(220, 53, 69, 0.1)'
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    async function loadUsers() {
        const res = await App.fetchWithAuth('/api/admin/users');
        const users = await res.json();
        let html = '';
        users.forEach(u => {
            html += `<tr>
                <td>${u.name}</td>
                <td>${u.email}</td>
                <td><span class="badge ${u.role === 'admin' ? 'badge-danger' : 'badge-secondary'}">${u.role}</span></td>
                <td>${new Date(u.createdAt).toLocaleDateString()}</td>
                <td>
                    <button class="btn btn-sm btn-link text-danger" onclick="deleteUser(${u.id})"><i class="fas fa-trash"></i></button>
                </td>
            </tr>`;
        });
        document.getElementById('userTableBody').innerHTML = html;
    }

    function showSection(id) {
        document.querySelectorAll('.admin-section').forEach(s => s.classList.add('d-none'));
        document.getElementById('section-' + id).classList.remove('d-none');
    }

    document.addEventListener('DOMContentLoaded', initDashboard);
</script>

</body>
</html>
