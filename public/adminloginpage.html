<!doctype html>
<html>
<head>
  <meta charset="utf-8"><title>Admin Login</title>
  <link rel="stylesheet" href="loginpage.css">
</head>
<body>
  <main class="d-flex align-items-center justify-content-center" style="min-height:100vh;">
    <div class="card p-3" style="width:360px;">
      <h4>Admin Login</h4>
      <form onsubmit="event.preventDefault(); adminLogin();">
        <div class="form-group"><label>Email</label><input id="email" class="form-control" required></div>
        <div class="form-group"><label>Password</label><input id="pwd" type="password" class="form-control" required></div>
        <button class="btn btn-danger btn-block">Login</button>
      </form>
    </div>
  </main>

<script src="/login.js"></script>
<script>
async function adminLogin() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("pwd").value;

  const login = await performLogin(email, password);

  if (!login) return;

  if (login.user.role !== "admin") {
    alert("This is not an admin account!");
    localStorage.clear();
    return;
  }
}

</script>


</body>
</html>
