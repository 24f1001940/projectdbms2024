<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login | Jamia Canteen</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="mainpages.css">
  <style>
    .login-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-container-card {
      width: 100%;
      max-width: 400px;
    }
    label { color: rgba(255,255,255,0.8); font-size: 0.9rem; }
  </style>
</head>
<body class="bg-dark">

  <nav class="navbar navbar-expand-lg navbar-dark fixed-top custom-navbar">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="mainpage.html">
        <i class="fas fa-utensils mr-2 text-warning"></i> 
        <span class="font-weight-bold">JAMIA CANTEEN</span>
      </a>
    </div>
  </nav>

  <div class="login-wrapper">
    <div class="login-card login-container-card shadow-lg">
      <div class="text-center mb-4">
        <h3 class="text-white font-weight-bold">Welcome Back</h3>
        <p class="text-white-50 small">Login to your account</p>
      </div>
      
      <form onsubmit="event.preventDefault(); loginUser();">
        <div class="form-group">
          <label for="email"><i class="fas fa-envelope mr-2"></i>Email Address</label>
          <input id="email" type="email" class="form-control" placeholder="name@example.com" required>
        </div>
        <div class="form-group">
          <label for="pwd"><i class="fas fa-lock mr-2"></i>Password</label>
          <input id="pwd" type="password" class="form-control" placeholder="••••••••" required>
        </div>
        <button class="btn btn-danger btn-block py-2 mt-4 font-weight-bold" type="submit">LOGIN</button>
      </form>
      
      <div class="text-center mt-4 pt-2 border-top border-secondary">
        <p class="text-white-50 small">Don't have an account? <a href="/signup.html" class="text-warning">Sign up here</a></p>
      </div>
    </div>
  </div>

  <script src="/login.js"></script>
  <script>
    async function loginUser() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("pwd").value;
      await performLogin(email, password);
    }
  </script>
</body>
</html>
