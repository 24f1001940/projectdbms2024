<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Owner Dashboard | Jamia Canteen</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="mainpages.css">

  <style>
    .order-card { border-left: 5px solid var(--primary); margin-bottom: 1rem; }
    .status-badge { border-radius: 20px; padding: 5px 15px; font-size: 0.8rem; font-weight: 600; }
    .status-pending { background: #ffc107; color: #000; }
    .status-preparing { background: #17a2b8; color: #fff; }
    .status-ready { background: #28a745; color: #fff; }
    .menu-item-row:hover { background: rgba(255,255,255,0.05); }
  </style>
</head>

<body>

<div class="sidebar shadow-lg">
    <div class="text-center mb-5">
        <h4 class="font-weight-bold text-gradient">OWNER PANEL</h4>
    </div>
    <ul class="list-group list-group-flush bg-transparent">
        <a href="#" class="list-group-item bg-transparent text-white border-0 active" onclick="showSection('orders')"><i class="fas fa-clipboard-list mr-3"></i>Live Orders</a>
        <a href="#" class="list-group-item bg-transparent text-white border-0" onclick="showSection('menu')"><i class="fas fa-utensils mr-3"></i>Menu Management</a>
        <a href="#" class="list-group-item bg-transparent text-white border-0" onclick="showSection('analytics')"><i class="fas fa-chart-pie mr-3"></i>Analytics</a>
        <hr class="bg-secondary w-100">
        <a href="#" class="list-group-item bg-transparent text-warning border-0" onclick="App.logout()"><i class="fas fa-sign-out-alt mr-3"></i>Logout</a>
    </ul>
</div>

<div class="main-content">
    <nav class="navbar navbar-expand-lg mb-4 glass-card">
        <div class="container-fluid">
            <span class="navbar-text">Canteen: <strong id="canteenNameDisplay">...</strong></span>
            <div class="ml-auto">
                <button class="btn btn-sm btn-outline-light mr-2" onclick="App.toggleTheme()"><i class="fas fa-moon"></i></button>
                <div class="badge badge-success p-2"><i class="fas fa-circle mr-2"></i>Live System Active</div>
            </div>
        </div>
    </nav>

    <!-- LIVE ORDERS SECTION -->
    <div id="section-orders" class="owner-section animate-fade-in">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="font-weight-bold">Incoming Orders</h4>
            <button class="btn btn-outline-primary btn-sm" onclick="loadOrders()"><i class="fas fa-sync mr-2"></i>Refresh</button>
        </div>
        <div id="ordersContainer">
            <!-- Orders injected here -->
        </div>
    </div>

    <!-- MENU MANAGEMENT SECTION -->
    <div id="section-menu" class="owner-section animate-fade-in d-none">
        <div class="row">
            <div class="col-md-4">
                <div class="glass-card p-4 mb-4">
                    <h5 class="font-weight-bold mb-4">Add Menu Item</h5>
                    <form onsubmit="event.preventDefault(); handleAddItem();">
                        <div class="form-group">
                            <label class="small">Item Name</label>
                            <input id="newItemName" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label class="small">Price (₹)</label>
                            <input id="newItemPrice" type="number" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label class="small">Category</label>
                            <select id="newItemCategory" class="form-control">
                                <option value="meals">Meals</option>
                                <option value="snacks">Snacks</option>
                                <option value="drinks">Drinks</option>
                            </select>
                        </div>
                        <button class="btn btn-danger btn-block py-2">ADD TO MENU</button>
                    </form>
                </div>
            </div>
            <div class="col-md-8">
                <div class="glass-card p-4">
                    <h5 class="font-weight-bold mb-4">Current Menu</h5>
                    <div class="table-responsive">
                        <table class="table table-dark bg-transparent">
                            <thead>
                                <tr>
                                    <th>Item</th>
                                    <th>Price</th>
                                    <th>Category</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="menuTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ANALYTICS SECTION -->
    <div id="section-analytics" class="owner-section animate-fade-in d-none">
        <div class="row">
            <div class="col-md-6">
                <div class="glass-card p-4">
                    <h5>Revenue Stats</h5>
                    <canvas id="revenueChart"></canvas>
                </div>
            </div>
            <div class="col-md-6">
                <div class="glass-card p-4">
                    <h5>Popular Items</h5>
                    <canvas id="popularChart"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script src="/app.js"></script>
<script>
    const socket = io();
    const user = JSON.parse(localStorage.getItem('user'));

    async function init() {
        if (!user || user.role !== 'owner') window.location.href = '/loginpage.html';
        
        // Join socket room for this canteen
        socket.emit('join-canteen', user.canteen_id);
        
        socket.on('new-order', (data) => {
            App.showToast("New order received!", "success");
            loadOrders();
        });

        loadOrders();
        loadMenu();
    }

    async function loadOrders() {
        const res = await App.fetchWithAuth('/api/owner/orders');
        const orders = await res.json();
        let html = '';
        orders.forEach(o => {
            html += `
                <div class="glass-card p-4 order-card animate-fade-in">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <h6 class="font-weight-bold mb-1">Order #${o.id}</h6>
                            <p class="small text-muted mb-3">${new Date(o.createdAt).toLocaleString()}</p>
                            <div class="mb-3">
                                ${o.order_items.map(it => `<span class="badge badge-secondary mr-2">${it.item.name} x ${it.quantity}</span>`).join('')}
                            </div>
                        </div>
                        <div class="text-right">
                            <span class="status-badge status-${o.status}">${o.status.toUpperCase()}</span>
                            <h5 class="mt-2 font-weight-bold text-danger">₹${o.total}</h5>
                        </div>
                    </div>
                    <div class="mt-3 pt-3 border-top border-secondary d-flex gap-2">
                        ${o.status === 'pending' ? `<button class="btn btn-sm btn-info px-3" onclick="updateStatus(${o.id}, 'preparing')">PREPARE</button>` : ''}
                        ${o.status === 'preparing' ? `<button class="btn btn-sm btn-success px-3" onclick="updateStatus(${o.id}, 'ready')">MARK READY</button>` : ''}
                        ${o.status === 'ready' ? `<button class="btn btn-sm btn-primary px-3" onclick="updateStatus(${o.id}, 'completed')">COMPLETE</button>` : ''}
                        <button class="btn btn-sm btn-outline-danger px-3 ml-auto" onclick="updateStatus(${o.id}, 'cancelled')">CANCEL</button>
                    </div>
                </div>
            `;
        });
        document.getElementById('ordersContainer').innerHTML = html || '<div class="text-center py-5 text-muted">No active orders</div>';
    }

    async function updateStatus(id, status) {
        // We'll need to implement this API
        await App.fetchWithAuth(`/api/owner/orders/${id}/status`, {
            method: 'PUT',
            body: JSON.stringify({ status })
        });
        App.showToast(`Order updated to ${status}`);
        loadOrders();
    }

    async function loadMenu() {
        const res = await App.fetchWithAuth(`/api/canteens/${user.canteen_id}/menu`);
        const items = await res.json();
        let html = '';
        items.forEach(it => {
            html += `
                <tr class="menu-item-row">
                    <td>${it.name}</td>
                    <td>₹${it.price}</td>
                    <td><span class="small text-muted">${it.category}</span></td>
                    <td><span class="badge ${it.is_active ? 'badge-success' : 'badge-danger'}">${it.is_active ? 'Active' : 'Hidden'}</span></td>
                    <td>
                        <button class="btn btn-sm btn-link text-warning" onclick="toggleItem(${it.id})"><i class="fas fa-eye-slash"></i></button>
                        <button class="btn btn-sm btn-link text-danger" onclick="deleteItem(${it.id})"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `;
        });
        document.getElementById('menuTableBody').innerHTML = html;
    }

    function showSection(id) {
        document.querySelectorAll('.owner-section').forEach(s => s.classList.add('d-none'));
        document.getElementById('section-' + id).classList.remove('d-none');
    }

    document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
