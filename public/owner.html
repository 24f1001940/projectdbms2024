<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Owner Dashboard | Jamia Canteen</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="mainpages.css">

  <style>
    body { background: #f8f9fa; color: #333; }
    .dashboard-header { background: #dc3545; color: white; padding: 20px 0; margin-bottom: 30px; }
    .owner-card { border: none; border-radius: 12px; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; }
    .section-title { font-weight: 700; color: #1e1e2f; border-left: 4px solid #dc3545; padding-left: 15px; margin-bottom: 20px; }
    .order-item { border-left: 3px solid #ffc107; background: #fffdf5; transition: 0.2s; }
    .order-item:hover { background: #fff9e6; }
  </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center" href="#">
      <i class="fas fa-utensils mr-2 text-warning"></i> 
      <span class="font-weight-bold">CANTEEN OWNER PANEL</span>
    </a>
    <button class="btn btn-outline-danger btn-sm" onclick="logout()"><i class="fas fa-sign-out-alt mr-1"></i> Logout</button>
  </div>
</nav>

<div class="dashboard-header text-center">
  <div class="container">
    <h2 class="mb-0 font-weight-bold">Manage Your Canteen</h2>
    <p class="text-white-50 small mb-0">Track orders and update your menu in real-time</p>
  </div>
</div>

<div class="container mb-5">
  <div class="row">

    <!-- MENU MANAGEMENT -->
    <div class="col-lg-5">
      <div class="card owner-card">
        <div class="card-body">
          <h5 class="section-title">Add New Menu Item</h5>
          <form onsubmit="event.preventDefault(); addItem();">
            <div class="form-group">
              <label class="small font-weight-bold">Item Name</label>
              <input id="itemName" class="form-control" placeholder="e.g. Special Chicken Biryani" required>
            </div>
            <div class="form-group">
              <label class="small font-weight-bold">Price (₹)</label>
              <input id="itemPrice" class="form-control" placeholder="0.00" type="number" step="0.01" required>
            </div>
            <button class="btn btn-danger btn-block font-weight-bold py-2" type="submit">
              <i class="fas fa-plus-circle mr-2"></i>ADD TO MENU
            </button>
          </form>
          
          <hr class="my-4">
          <h6 class="font-weight-bold mb-3">Your Menu Highlights</h6>
          <div id="menuItemsList" class="small text-muted">
            <!-- Briefly show some items -->
          </div>
        </div>
      </div>
    </div>

    <!-- ORDERS MANAGEMENT -->
    <div class="col-lg-7">
      <div class="card owner-card">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <h5 class="section-title mb-0">Recent Orders</h5>
            <button class="btn btn-outline-primary btn-sm rounded-pill" onclick="loadOrders()">
              <i class="fas fa-sync-alt mr-1"></i> Refresh
            </button>
          </div>
          <div id="ordersList">
            <div class="text-center py-5 text-muted">
              <i class="fas fa-clipboard-list fa-3x mb-3"></i>
              <p>No active orders at the moment</p>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

<script>
const token = localStorage.getItem("token");
const user = JSON.parse(localStorage.getItem("user"));

if (!token || !user || user.role !== "owner") {
  window.location.href = "/loginpage.html";
}

function logout() {
  localStorage.clear();
  window.location.href = "/mainpage.html";
}

async function loadOrders() {
  try {
    const res = await fetch("/api/owner/orders", {
      headers: { Authorization: "Bearer " + token }
    });
    if (!res.ok) throw new Error("Failed to load");
    const data = await res.json();

    let html = "";
    data.reverse().forEach(o => {
      html += `
        <div class="card p-3 mb-3 order-item shadow-sm border-0">
          <div class="d-flex justify-content-between align-items-start">
            <div>
              <h6 class="font-weight-bold mb-1 text-danger">Order #${o.id}</h6>
              <p class="small text-muted mb-0">Time: ${new Date(o.createdAt).toLocaleTimeString()}</p>
            </div>
            <div class="text-right">
              <span class="badge badge-warning px-3 py-2">PENDING</span>
              <h5 class="mt-2 mb-0 font-weight-bold text-dark">₹${o.total}</h5>
            </div>
          </div>
        </div>
      `;
    });

    document.getElementById("ordersList").innerHTML = html || "<p class='text-center text-muted'>No orders found.</p>";
  } catch (err) {
    console.error(err);
  }
}

async function addItem() {
  const name = document.getElementById("itemName").value.trim();
  const price = document.getElementById("itemPrice").value;

  try {
    const res = await fetch("/api/owner/items", {
      method: "POST",
      headers: { "Content-Type": "application/json", Authorization: "Bearer " + token },
      body: JSON.stringify({
        name,
        price,
        canteen_id: user.canteen_id
      })
    });

    const data = await res.json();
    if (res.ok) {
      alert("Item added successfully!");
      document.getElementById("itemName").value = "";
      document.getElementById("itemPrice").value = "";
    } else {
      alert("Error: " + data.message);
    }
  } catch (err) {
    alert("Server error");
  }
}

loadOrders();
// Poll for new orders every 30 seconds (Vercel alternative to persistent sockets)
setInterval(loadOrders, 30000);
</script>

</body>
</html>
