<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Password Recovery | Jamia Canteen</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="mainpages.css">
  <style>
    .recovery-wrap { min-height: 100vh; display: grid; place-items: center; padding: 1rem; }
    .recovery-card { width: 100%; max-width: 560px; }
  </style>
</head>
<body class="bg-dark">
  <div class="recovery-wrap">
    <div class="login-card recovery-card shadow-lg">
      <div class="text-center mb-4">
        <i class="fas fa-shield-halved fa-3x text-warning mb-3"></i>
        <h3 class="text-white font-weight-bold">Account Recovery</h3>
        <p class="text-white-50 small">Generate or use a reset token to restore access</p>
      </div>

      <div class="row">
        <div class="col-md-6 mb-4">
          <h6 class="text-white font-weight-bold mb-3">Forgot Password</h6>
          <div class="form-group">
            <label class="text-white-50 small">Email</label>
            <input id="forgotEmail" type="email" class="form-control" placeholder="name@example.com">
          </div>
          <button class="btn btn-warning btn-block font-weight-bold" onclick="generateReset()">GENERATE TOKEN</button>
        </div>

        <div class="col-md-6 mb-4">
          <h6 class="text-white font-weight-bold mb-3">Reset Password</h6>
          <div class="form-group">
            <label class="text-white-50 small">Email</label>
            <input id="resetEmail" type="email" class="form-control" placeholder="name@example.com">
          </div>
          <div class="form-group">
            <label class="text-white-50 small">Reset Token</label>
            <input id="resetToken" type="text" class="form-control" placeholder="token from email or demo response">
          </div>
          <div class="form-group">
            <label class="text-white-50 small">New Password</label>
            <input id="resetPassword" type="password" class="form-control" placeholder="At least 8 characters">
          </div>
          <button class="btn btn-danger btn-block font-weight-bold" onclick="resetPassword()">RESET PASSWORD</button>
        </div>
      </div>

      <div class="text-center mt-3 small">
        <a href="/loginpage.html" class="text-warning">Back to login</a>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
  <script>
    App.initTheme();

    async function generateReset() {
      const email = document.getElementById('forgotEmail').value.trim();
      if (!email) return App.showToast('Email is required', 'error');

      const res = await fetch('/api/auth/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      const data = await res.json();
      if (res.ok) {
        App.showToast(data.message || 'Reset token generated');
        if (data.resetToken) {
          alert(`Demo reset token: ${data.resetToken}`);
        }
      } else {
        App.showToast(data.message || 'Unable to generate token', 'error');
      }
    }

    async function resetPassword() {
      const email = document.getElementById('resetEmail').value.trim();
      const token = document.getElementById('resetToken').value.trim();
      const password = document.getElementById('resetPassword').value;
      const res = await fetch('/api/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, token, password })
      });
      const data = await res.json();
      if (res.ok) {
        App.showToast(data.message || 'Password reset successfully');
        setTimeout(() => window.location.href = '/loginpage.html', 1000);
      } else {
        App.showToast(data.message || 'Reset failed', 'error');
      }
    }
  </script>
</body>
</html>
