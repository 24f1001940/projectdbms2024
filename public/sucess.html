<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Order Placed | Jamia Canteen</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="mainpages.css">
  <style>
    .success-icon { font-size: 5rem; color: #28a745; margin-bottom: 2rem; }
    .status-stepper { display: flex; justify-content: space-between; position: relative; margin-top: 3rem; }
    .status-stepper::before { content: ""; position: absolute; top: 15px; left: 0; width: 100%; height: 2px; background: rgba(255,255,255,0.1); z-index: 0; }
    .step { z-index: 1; text-align: center; }
    .step-circle { width: 35px; height: 35px; border-radius: 50%; background: #333; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 2px solid transparent; }
    .step.active .step-circle { background: #28a745; border-color: #fff; }
    .step.active span { color: #fff; font-weight: bold; }
    span { font-size: 0.8rem; color: var(--text-muted); }
  </style>
</head>
<body class="bg-dark">

  <div class="container text-center" style="margin-top: 100px;">
    <div class="glass-card p-5 max-width-600 mx-auto animate-fade-in">
        <i class="fas fa-check-circle success-icon"></i>
        <h2 class="font-weight-bold mb-3">Order Placed Successfully!</h2>
        <p class="text-white-50">Your order #<span id="order-id-display">...</span> has been sent to the kitchen.</p>

        <div class="status-stepper">
            <div class="step active" id="step-pending">
                <div class="step-circle">1</div>
                <span>Pending</span>
            </div>
            <div class="step" id="step-preparing">
                <div class="step-circle">2</div>
                <span>Preparing</span>
            </div>
            <div class="step" id="step-ready">
                <div class="step-circle">3</div>
                <span>Ready</span>
            </div>
            <div class="step" id="step-completed">
                <div class="step-circle">4</div>
                <span>Enjoy!</span>
            </div>
        </div>

        <div class="mt-5">
            <a href="user.html" class="btn btn-primary-modern px-5 py-3">VIEW MY ORDERS</a>
            <p class="mt-4"><a href="explore.html" class="text-warning">Order something else?</a></p>
        </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/app.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const orderId = urlParams.get('order');
    document.getElementById('order-id-display').innerText = orderId;

    const socket = io();
    const user = JSON.parse(localStorage.getItem('user'));

    socket.on(`order-status-${user.id}`, (data) => {
        if (data.orderId == orderId) {
            updateStepper(data.status);
            App.showToast(`Order status updated to: ${data.status.toUpperCase()}`);
        }
    });

    function updateStepper(status) {
        const steps = ['pending', 'preparing', 'ready', 'completed'];
        const currentIdx = steps.indexOf(status);
        steps.forEach((s, i) => {
            const el = document.getElementById(`step-${s}`);
            if (i <= currentIdx) el.classList.add('active');
            else el.classList.remove('active');
        });
    }
  </script>
</body>
</html>
