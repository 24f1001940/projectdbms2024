<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>User Dashboard | Jamia Canteen</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="mainpages.css">

  <style>
    body { background: #f8f9fa; color: #333; }
    .user-hero { background: linear-gradient(rgba(30, 30, 47, 0.8), rgba(30, 30, 47, 0.8)), url('https://thumbs.dreamstime.com/b/different-spices-herbs-stone-table-top-view-ingredients-cooking-food-background-different-spices-herbs-black-120232209.jpg'); background-size: cover; color: white; padding: 60px 0; }
    .dashboard-card { border: none; border-radius: 15px; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .section-title { font-weight: 700; color: #dc3545; margin-bottom: 20px; }
    .order-history-item { border-left: 4px solid #28a745; margin-bottom: 15px; transition: 0.3s; }
    .order-history-item:hover { background: #f1f8f1; }
  </style>
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="mainpage.html">
        <i class="fas fa-utensils mr-2 text-warning"></i> 
        <span class="font-weight-bold">JAMIA CANTEEN</span>
      </a>
      <div class="ml-auto">
        <a href="explore.html" class="btn btn-warning btn-sm mr-2 font-weight-bold">ORDER NOW</a>
        <button class="btn btn-outline-danger btn-sm" onclick="logout()">Logout</button>
      </div>
    </div>
  </nav>

  <div class="user-hero text-center">
    <div class="container">
      <h2 class="font-weight-bold" id="welcomeUser">Welcome, Guest</h2>
      <p class="text-white-50">Satisfy your cravings with just a few clicks!</p>
    </div>
  </div>

  <div class="container my-5">
    <div class="row">
      <!-- Profile Card -->
      <div class="col-md-4 mb-4">
        <div class="card dashboard-card p-4 text-center">
          <div class="mb-3">
            <i class="fas fa-user-circle fa-5x text-secondary"></i>
          </div>
          <h4 id="profileName" class="font-weight-bold mb-1">...</h4>
          <p id="profileEmail" class="text-muted small">...</p>
          <hr>
          <div class="text-left small">
            <p class="mb-1"><strong>Role:</strong> <span class="badge badge-danger">Customer</span></p>
            <p class="mb-1"><strong>Account Created:</strong> <span id="accountDate">...</span></p>
          </div>
        </div>
      </div>

      <!-- Recent Orders -->
      <div class="col-md-8 mb-4">
        <div class="card dashboard-card p-4">
          <h4 class="section-title">Your Recent Orders</h4>
          <div id="orderHistory">
            <div class="text-center py-5 text-muted">
              <i class="fas fa-history fa-3x mb-3"></i>
              <p>Fetching your orders...</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem("token");
    const userData = JSON.parse(localStorage.getItem("user") || "{}");

    if (!token) window.location.href = "/loginpage.html";

    document.getElementById("welcomeUser").innerText = `Welcome, ${userData.name || 'User'}`;
    document.getElementById("profileName").innerText = userData.name || 'User';
    document.getElementById("profileEmail").innerText = userData.email || '';

    function logout() {
      localStorage.clear();
      window.location.href = "/mainpage.html";
    }

    async function loadOrders() {
      // Note: Backend might need an endpoint for user-specific orders
      // For now, if we don't have one, we show a message or fetch all if it's filtered by middleware
      try {
        // Mocking behavior or using potential endpoint
        const res = await fetch("/api/orders/my", { // We should create this endpoint
          headers: { Authorization: "Bearer " + token }
        });
        
        // If /api/orders/my doesn't exist, we fallback or just handle error
        if (!res.ok) {
           document.getElementById("orderHistory").innerHTML = "<p class='text-center text-muted py-4'>No orders found yet. <br><a href='explore.html' class='text-danger font-weight-bold'>Order something delicious!</a></p>";
           return;
        }

        const data = await res.json();
        let html = "";
        data.reverse().forEach(o => {
          html += `
            <div class="card p-3 order-history-item border-top-0 border-right-0 border-bottom-0">
              <div class="d-flex justify-content-between align-items-center">
                <div>
                  <h6 class="font-weight-bold mb-0">Order #${o.id}</h6>
                  <small class="text-muted">${new Date(o.createdAt).toLocaleDateString()}</small>
                </div>
                <div class="text-right">
                  <span class="text-success font-weight-bold">₹${o.total}</span> <br>
                  <a href="/receipt.html?order=${o.id}" class="small text-primary">View Details</a>
                </div>
              </div>
            </div>
          `;
        });
        document.getElementById("orderHistory").innerHTML = html || "<p class='text-muted'>No orders placed yet.</p>";
      } catch(err) {
        document.getElementById("orderHistory").innerHTML = "<p class='text-muted'>Unable to load orders.</p>";
      }
    }

    loadOrders();
  </script>
</body>
</html>
